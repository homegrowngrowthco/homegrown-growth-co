name: Link Check

# Scans the live production site (so clean-URL redirects in netlify.toml resolve
# correctly and we test what real visitors see). lychee fetches each page,
# parses the HTML, and validates every link found inside.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Mondays at 09:00 UTC

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run lychee against live site
        uses: lycheeverse/lychee-action@v2
        with:
          lycheeVersion: v0.18.1
          # Skip linkedin.com (returns 999 to bots) and calendly.com (JS-rendered).
          args: >-
            --verbose
            --no-progress
            --max-concurrency 2
            --timeout 30
            --max-retries 3
            --retry-wait-time 10
            --exclude "linkedin\\.com"
            --exclude "calendly\\.com"
            --accept 200,206,301,302,403,429
            https://homegrowngrowth.co/
            https://homegrowngrowth.co/services
            https://homegrowngrowth.co/pricing
            https://homegrowngrowth.co/about
            https://homegrowngrowth.co/roi-call
            https://homegrowngrowth.co/for-saas
            https://homegrowngrowth.co/case-studies
            https://homegrowngrowth.co/fractional-revops
            https://homegrowngrowth.co/crm-implementation
            https://homegrowngrowth.co/process-automation
            https://homegrowngrowth.co/reporting-analytics
            https://homegrowngrowth.co/tech-stack-audit
            https://homegrowngrowth.co/sales-comp-enablement
          fail: true
          failIfEmpty: false
          jobSummary: true
