name: Link Check

# Scans the live production site (so clean-URL redirects in netlify.toml resolve
# correctly and we test what real visitors see). Runs weekly + on demand.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Mondays at 09:00 UTC

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Run lychee against live site
        uses: lycheeverse/lychee-action@v2
        with:
          # Crawl from the sitemap (covers every indexed page).
          # Skip linkedin.com (returns 999 to bots) and calendly.com (JS-rendered).
          args: >-
            --verbose
            --no-progress
            --max-concurrency 6
            --timeout 30
            --exclude "linkedin\\.com"
            --exclude "calendly\\.com"
            --accept 200,206,301,302,403,429
            https://homegrowngrowth.co/sitemap.xml
          fail: true
          jobSummary: true
