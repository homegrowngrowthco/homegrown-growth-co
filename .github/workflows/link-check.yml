name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 09:00 UTC to catch external links that have rotted
    - cron: '0 9 * * 1'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan all HTML and Markdown in the repo. Skip:
          #   - mailto: links (no DNS to check)
          #   - LinkedIn URLs (often 999/403 to bots; not actually broken)
          #   - calendly.com (requires JS-rendered content)
          args: >-
            --verbose
            --no-progress
            --max-concurrency 8
            --timeout 20
            --exclude-mail
            --exclude "linkedin\\.com"
            --exclude "calendly\\.com"
            --accept 200,206,301,302,403,429
            './**/*.html'
            './**/*.md'
          fail: true
          jobSummary: true
